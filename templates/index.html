<!DOCTYPE html>
<html>

<head>
    <title>AI Image Detector</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #2c5364, #00c9a7, #fcb045);
            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02));
            background-size: 200% 200%;
            animation: gradientMove 10s ease infinite;
            backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            width: 380px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 600;
        }

        input[type="file"] {
            margin: 15px 0;
            color: white;
        }

        button {
            background: linear-gradient(135deg, #00c9a7, #00b4d8);
            border: none;
            padding: 14px 30px;
            font-size: 16px;
            color: white;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s ease;
            margin-top: 10px;
            width: 100%;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
        }

        img {
            margin-top: 20px;
            max-width: 100%;
            border-radius: 12px;
            display: none;
        }

        .result {
            margin-top: 20px;
            font-size: 22px;
            font-weight: bold;
        }

        .real {
            color: #00ffcc;
        }

        .fake {
            color: #ff4d6d;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>AI Image Detector</h2>

        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="image" accept="image/*" onchange="previewImage(event)" required>
            <br>
            <button type="submit">Predict</button>
        </form>

        <!-- Image Preview -->
        <img id="preview" />

        {% if result %}
        <div class="result">
            Result:
            <span class="{{ 'real' if 'REAL' in result else 'fake' }}">
                {{ result }}
            </span>
        </div>
        {% endif %}
    </div>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function () {
                const img = document.getElementById('preview');
                img.src = reader.result;
                img.style.display = "block";
            }
            reader.readAsDataURL(event.target.files[0]);
        }
    </script>

</body>

</html>
